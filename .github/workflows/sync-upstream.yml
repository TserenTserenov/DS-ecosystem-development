name: Sync upstream

# Синхронизирует форк с aisystant/DS-ecosystem-development.
# Реиндексация НЕ нужна здесь — gateway-mcp автоматически реиндексирует
# при получении push webhook от GitHub App (WP-5 Ф12b).

on:
  schedule:
    - cron: '0 * * * *'   # каждый час — проверяет наличие изменений
  workflow_dispatch:        # ручной запуск

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      - name: Fetch upstream
        run: git remote add upstream https://github.com/aisystant/DS-ecosystem-development.git && git fetch upstream main

      - name: Check and sync if changed
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No changes from upstream — skipping"
          else
            echo "Changes detected — syncing"
            git rebase upstream/main
            git push origin main --force-with-lease
            echo "Synced. Gateway-mcp получит push webhook и запустит реиндексацию автоматически."
          fi
